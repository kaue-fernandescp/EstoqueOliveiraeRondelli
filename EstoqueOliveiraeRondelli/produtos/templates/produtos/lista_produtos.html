<!DOCTYPE html>
{% extends "core/base.html" %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Oliveira e Rondelli</title>
</head>
<body>
    {% block content %}
    <h1>Produtos</h1>
    <ul>
        {% for produto in produtos %}
            <li><a href="{% url 'produto' produto.id %}">{{ produto }}</a></li>
        {% empty %}
            <li>Não existe produto cadastrado.</li>
        {% endfor %}
    </ul>
    <div>
        <button><a href="{% url 'novo_produto' %}">Novo Produto</a></button>
    </div>
    {% endblock content %}
</body>
</html>
