<!DOCTYPE html>
{% extends "core/base.html" %}
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block extra_css %}
        <link rel="stylesheet" href="{% static 'css/movimentacoes.css' %}">
    {% endblock %}
    <title>Estoque Oliveira e Rondelli</title>
</head>
<body>
    {% block content %}
    <h1>Nova Entrada</h1>
    <div class="container-formulario">
    <form class="formulario" action="{% url 'nova_entrada' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="container-botao">
            <a href="{% url 'movimentacoes' %}" class="botao-voltar">Voltar</a>
            <button class="botao-salvar" type="submit">Adicionar</button>
        </div>
    </form>
    </div>
    {% endblock content %}
</body>
</html>
