<!DOCTYPE html>
{% extends "core/base.html" %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Oliveira e Rondelli</title>
</head>
<body>
    {% block content %}
    <h1>Usuários</h1>
    <ul>
        {% for usuario in usuarios %}
            <li>{{ usuario }}</li>
        {% empty %}
            <li>Não existe usuário cadastrado.</li>
        {% endfor %}
    </ul>
    <div>
        <button><a href="{% url 'registrar' %}">Cadastrar Usuário</a></button>
    </div>
    {% endblock content %}
</body>
</html>
