<!DOCTYPE html>
{% extends "core/base-login.html" %}
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block extra_css %}
        <link rel="stylesheet" href="{% static 'css/usuarios.css' %}">
    {% endblock %}
    <title>Oliveira e Rondelli</title>
</head>
<body>
    {% block content %}
        <main>
            <div class="container-logo">
                <img class="logo" src="{% static 'imagens/logo.png' %}" alt="Logo Oliveira e Rondelli">
            </div>
            <div class="container-formulario">
                <h2 class="login-p">Gerenciamento de Material de Consumo</h2>
                <h3 class="login-h">Login</h3>
                <form class="formulario" action="{% url 'login' %}" method='post'>
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="container-botao">
                        <button class="botao-entrar" name="submit">Entrar</button>
                    </div>
                    <input type="hidden" name="next" value="{% url 'index' %}">
                </form>
            </div>
        </main>
    {% endblock content %}
</body>
</html>
