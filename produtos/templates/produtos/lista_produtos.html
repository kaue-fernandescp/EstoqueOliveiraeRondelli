<!DOCTYPE html>
{% extends "core/base.html" %}
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block produto_css %}
        <link rel="stylesheet" href="{% static 'css/produtos.css' %}">
    {% endblock %}
    <title>Oliveira e Rondelli - Produtos</title>
</head>
<body>
    {% block content %}
    <h1>Produtos</h1>
    <ul class="lista_produtos">
        {% for produto in produtos %}
            <a href="{% url 'produto' produto.id %}"><li>{{ produto }}</li></a>
        {% empty %}
            <li>Não existe produto cadastrado.</li>
        {% endfor %}
    </ul>
    <div class="container-botao">
        <a href="{% url 'novo_produto' %}"><button class="botao-novo-produto">Novo Produto</button></a>
    </div>
    {% endblock content %}
</body>
</html>
