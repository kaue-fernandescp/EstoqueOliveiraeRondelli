<!DOCTYPE html>
{% extends "core/base.html" %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque Oliveira e Rondelli</title>
</head>
<body>
    {% block content %}
        <h1>{{ produto.pro_descricao }}</h1>
        <ul>
            <li>Referência: {{ produto.pro_referencia }}</li>
            <li>Unidade de Medida: {{ produto.pro_unidade }}</li>
            <li>Preço: R$ {{ produto.pro_preco }}</li>
        </ul>
        <br>
        <button><a href="{% url 'alterar_produto' produto.id %}">Alterar Produto</a></button>
    {% endblock content %}
</body>
</html>
