<!DOCTYPE html>
{% extends "core/base.html" %}
{% load static %}
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block extra_css %}
        <link rel="stylesheet" href="{% static 'css/produtos.css' %}">
    {% endblock %}
    <title>Estoque Oliveira e Rondelli</title>
</head>
<body>
    {% block content %}
    <button><a href="{% url 'produtos' %}">Voltar</a></button>
    <br>
    <form action="{% url 'novo_produto' %}" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button name="submit">Adicionar</button>
    </form>
    {% endblock content %}
</body>
</html>
